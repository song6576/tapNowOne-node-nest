# TapNow 生产 Nginx 站点配置（宝塔 Windows）
# 用法：宝塔 → 网站 → www.tapnowone.top → 配置文件
# 可将本文件内容合并进 server { } 块，或对照修改现有 location

server {
    listen 80 default_server;
    server_name www.tapnowone.top tapnowone.top;

    # 前端静态资源（Vite build 输出目录）
    root C:/tapnowone/home;
    index index.html;

    # 建议先注释宝塔自带的 error_page，避免 SPA 路由被 404 页拦截
    # error_page 404 /404.html;

    # ── 后端 API（NestJS 默认 3000 端口）──
    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }

    # ── 静态资源（Python 后端生成文件，若未部署可保留备用）──
    location /static/ {
        proxy_pass http://127.0.0.1:8000/static/;
        proxy_set_header Host $host;
    }

    # ── 前端 SPA（React Router）──
    location / {
        try_files $uri $uri/ @spa;
    }

    location @spa {
        rewrite ^ /index.html break;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
